<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120" width="800" height="120">
  <defs>
    <style>
      .ornament { fill: #1a1a1a; stroke: none; }
    </style>
  </defs>

  <!-- Центральный ромб -->
  <path class="ornament" d="M 400 45 L 408 60 L 400 75 L 392 60 Z" />

  <!-- Правая сторона (основная группа) -->
  <g id="right-side">
    <!-- Основной горизонтальный штрих -->
    <path class="ornament" d="M 415 60 L 520 60 L 518 59 C 510 59 480 58 460 55 C 440 52 425 55 415 60 Z" />

    <!-- Верхний большой завиток -->
    <path class="ornament" d="M 430 60 C 430 40 470 35 490 50 C 500 58 490 65 480 62 C 475 60 478 55 482 55 C 485 55 488 58 485 61 C 480 64 470 58 475 50 C 485 40 515 45 510 60 C 508 68 495 72 485 68 C 470 63 450 50 430 60 Z" />

    <!-- Нижний завиток -->
    <path class="ornament" d="M 520 60 C 520 75 545 80 555 70 C 560 65 555 60 545 62 C 540 64 542 68 545 68 C 548 68 550 65 548 63 C 545 61 535 65 538 72 C 542 82 565 78 570 65 C 572 60 560 55 540 58 C 530 60 520 60 520 60 Z" />

    <!-- Правый хвостик -->
    <path class="ornament" d="M 570 60 L 620 60 L 615 59.5 C 600 59.5 580 59 570 60 Z" />

    <!-- Дополнительный декоративный элемент сверху справа -->
    <path class="ornament" d="M 530 55 C 540 50 550 52 555 58 C 556 60 554 62 552 61 C 550 60 552 57 550 55 C 545 53 535 55 530 55 Z" />
  </g>

  <!-- Левая сторона (зеркальное отражение) -->
  <use href="#right-side" transform="translate(800, 0) scale(-1, 1)" />
</svg>
